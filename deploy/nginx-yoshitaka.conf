# /etc/nginx/sites-available/yoshitaka
# Certbot will rewrite the listen blocks to add 443 + HTTP→HTTPS redirects when
# you run:  sudo certbot --nginx -d portal.yoshitakakaratedo.com

server {
    listen 80;
    listen [::]:80;
    server_name portal.yoshitakakaratedo.com;

    root /srv/yoshitaka/app/frontend/build;
    index index.html;

    # Member photos can hit ~1.2 MB; bg images ~1.5 MB. 5 MB gives plenty of
    # headroom for future multipart uploads.
    client_max_body_size 5M;

    # ─── Backend API ───────────────────────────────────────────────────
    # Anything under /api/ is reverse-proxied to gunicorn on localhost:8001.
    # The trailing slash on both sides is intentional: it preserves the path.
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ─── Frontend static assets ────────────────────────────────────────
    # Cache hashed JS/CSS aggressively, never cache the HTML shell.
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── React Router fallback ─────────────────────────────────────────
    # Every unknown path serves index.html so client-side routing works.
    location / {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri /index.html;
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
